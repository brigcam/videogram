services:
  videogram:
    build: .
    container_name: videogram
    restart: unless-stopped
    environment:
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN:?Create .env from .env.example and set TELEGRAM_BOT_TOKEN}
      ALLOWED_CHAT_IDS: ${ALLOWED_CHAT_IDS:-}
      ALLOWED_USER_IDS: ${ALLOWED_USER_IDS:-}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_SUMMARY_MODEL: ${OPENAI_SUMMARY_MODEL:-gpt-5.2}
      OPENAI_SUMMARY_PROMPT: ${OPENAI_SUMMARY_PROMPT:-Riassumi la trascrizione del video in italiano, in modo utile e conciso. Evidenzia i punti principali e conserva eventuali dettagli concreti importanti.}
      OPENAI_SUMMARY_MAX_TRANSCRIPT_CHARS: ${OPENAI_SUMMARY_MAX_TRANSCRIPT_CHARS:-20000}
      SUMMARY_TRANSCRIPT_LANGS: ${SUMMARY_TRANSCRIPT_LANGS:-it,en}
      MAX_DOWNLOAD_MB: ${MAX_DOWNLOAD_MB:-512}
      MAX_TELEGRAM_UPLOAD_MB: ${MAX_TELEGRAM_UPLOAD_MB:-48}
      DOWNLOAD_DIR: ${DOWNLOAD_DIR:-/tmp/videogram-downloads}
      MIN_FREE_DISK_PERCENT: ${MIN_FREE_DISK_PERCENT:-5}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      LOG_FILE: ${LOG_FILE:-/var/log/videogram/videogram.log}
      LOG_MAX_MB: ${LOG_MAX_MB:-10}
      LOG_BACKUP_COUNT: ${LOG_BACKUP_COUNT:-5}
      YTDLP_COOKIES_FILE: ${YTDLP_COOKIES_FILE:-}
      YTDLP_COOKIES_DIR: ${YTDLP_COOKIES_DIR:-/cookies}
    volumes:
      - ./downloads:/tmp/videogram-downloads
      - ./logs:/var/log/videogram
      - ./cookies:/cookies:ro
